name: Documentation

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install documentation dependencies
        run: pip install -r Documentation/requirements.txt

      - name: Install Revealer
        run: pip install .

      - name: Build demo presentations
        run: |
          # Run from a neutral directory so the root-level ``revealer.py`` shim
          # does not shadow the installed ``revealer`` package.
          cd "$RUNNER_TEMP"
          python - <<'PY'
          import os

          from revealer import assets
          from revealer.build import build

          repo = os.environ["GITHUB_WORKSPACE"]
          demo = os.path.join(repo, "Demo")

          # reveal.js and the generated *.html demos are git-ignored, so they
          # must be (re)generated here before Sphinx copies ../Demo verbatim.
          extensions = assets.read_presentation_extensions(demo)
          assets.setup_revealjs(demo, extensions)
          build(os.path.join(demo, "Demo.pres"))
          build(os.path.join(demo, "Simple.pres"))
          PY

      - name: Build HTML documentation
        run: sphinx-build -b html Documentation Documentation/_build/html

      - name: Disable Jekyll processing
        run: touch Documentation/_build/html/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: Documentation/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
